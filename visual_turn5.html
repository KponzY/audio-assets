<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>TURN5 TEST</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      display: block;
    }

    #msg {
      position: fixed;
      left: 12px;
      bottom: 12px;
      color: #fff;
      font: 14px/1.4 system-ui, sans-serif;
      background: rgba(0,0,0,.55);
      padding: 8px 10px;
      border-radius: 8px;
      z-index: 10;
    }
  </style>
</head>
<body>

  <video id="v" controls autoplay muted playsinline preload="auto">
    <source src="https://res.cloudinary.com/dacfx306s/video/upload/v1773501466/Turn5_Song_weof9a.mp4" type="video/mp4">
  </video>

  <div id="msg">loading...</div>

  <script>
    const v = document.getElementById('v');
    const msg = document.getElementById('msg');

    function log(t){
      console.log(t);
      msg.textContent = t;
    }

    v.addEventListener('loadstart', () => log('loadstart'));
    v.addEventListener('loadedmetadata', () => log('loadedmetadata'));
    v.addEventListener('loadeddata', () => log('loadeddata'));
    v.addEventListener('canplay', () => log('canplay'));
    v.addEventListener('canplaythrough', () => log('canplaythrough'));
    v.addEventListener('play', () => log('play'));
    v.addEventListener('playing', () => log('playing'));
    v.addEventListener('pause', () => log('pause'));
    v.addEventListener('ended', () => log('ended'));
    v.addEventListener('error', () => {
      const err = v.error;
      log('error: ' + (err ? err.code : 'unknown'));
    });

    window.addEventListener('load', async () => {
      try {
        await v.play();
        log('play() success');
      } catch (e) {
        log('play() blocked: ' + e.message);
      }
    });
  </script>

</body>
</html>
