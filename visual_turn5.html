<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>TURN5 Visual</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      display: block;
    }
  </style>
</head>
<body>

<video
  id="v"
  controls
  autoplay
  muted
  playsinline
  preload="auto"
  src="ここにTURN5動画URL">
</video>

<script>
const v = document.getElementById('v');

// ★ 再生後に音ON
window.addEventListener('load', async () => {
  try {
    await v.play();
    v.muted = false;
    console.log('play success & unmuted');
  } catch(e){
    console.log('play blocked', e);
  }
});
</script>

</body>
</html>
