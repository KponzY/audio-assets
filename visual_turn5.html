<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>TURN5 Visual</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      display: block;
    }
  </style>
</head>
<body>
  <video
    id="v"
    controls
    autoplay
    muted
    playsinline
    preload="auto"
    src="https://res.cloudinary.com/dacfx306s/video/upload/v1773501466/Turn5_Song_weof9a.mp4">
  </video>

  <script>
    const v = document.getElementById('v');

    v.addEventListener('loadedmetadata', () => console.log('loadedmetadata'));
    v.addEventListener('canplay', () => console.log('canplay'));
    v.addEventListener('playing', () => console.log('playing'));
    v.addEventListener('error', () => console.log('video error', v.error));

    window.addEventListener('load', async () => {
      try {
        await v.play();
        console.log('play success');
      } catch (e) {
        console.log('play blocked', e);
      }
    });
  </script>
</body>
</html>
