<body>
  <div class="wrap">
    <video id="finalVideo" playsinline preload="auto" muted>
      <source src="https://res.cloudinary.com/dacfx306s/video/upload/v1773501466/Turn5_Song_weof9a.mp4" type="video/mp4">
    </video>
    <div id="fallback">クリックして動画を再生</div>
  </div>

  <video id="v" controls autoplay muted playsinline preload="auto">
    <source src="https://res.cloudinary.com/dacfx306s/video/upload/v1773501466/Turn5_Song_weof9a.mp4" type="video/mp4">
  </video>

  <div id="msg">loading...</div>

<script>
    const v = document.getElementById('finalVideo');
    const fallback = document.getElementById('fallback');
    let started = false;
    const v = document.getElementById('v');
    const msg = document.getElementById('msg');

    function notifyParent(type, extra) {
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage(Object.assign({ type }, extra || {}), '*');
      }
    function log(t){
      console.log(t);
      msg.textContent = t;
}

    async function startVideo() {
    v.addEventListener('loadstart', () => log('loadstart'));
    v.addEventListener('loadedmetadata', () => log('loadedmetadata'));
    v.addEventListener('loadeddata', () => log('loadeddata'));
    v.addEventListener('canplay', () => log('canplay'));
    v.addEventListener('canplaythrough', () => log('canplaythrough'));
    v.addEventListener('play', () => log('play'));
    v.addEventListener('playing', () => log('playing'));
    v.addEventListener('pause', () => log('pause'));
    v.addEventListener('ended', () => log('ended'));
    v.addEventListener('error', () => {
      const err = v.error;
      log('error: ' + (err ? err.code : 'unknown'));
    });

    window.addEventListener('load', async () => {
try {
        // まず無音で再生を通す
        v.muted = true;
await v.play();

        started = true;
        fallback.style.display = 'none';
        notifyParent('TURN5_VIDEO_READY');

        // 再生が通った後で音を戻す
        setTimeout(() => {
          try { v.muted = false; } catch(e){}
        }, 300);

        log('play() success');
} catch (e) {
        console.log('autoplay blocked:', e);
        fallback.style.display = 'flex';
        log('play() blocked: ' + e.message);
}
    }

    window.addEventListener('load', startVideo);
    fallback.addEventListener('click', startVideo);

    v.addEventListener('ended', () => {
      notifyParent('TURN5_VIDEO_END');
    });

    v.addEventListener('error', () => {
      notifyParent('TURN5_VIDEO_ERROR', { message: 'video error' });
      fallback.style.display = 'flex';
});
</script>

</body>
</html>
