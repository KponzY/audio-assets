<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>TURN5 Visual</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
  </style>
</head>
<body>

<video id="v" autoplay playsinline></video>

<script>
const video = document.getElementById('v');

// ★ 今使ってるTURN5動画URLをここに入れる
const TURN5_VIDEO_URL = "https://res.cloudinary.com/dacfx306s/video/upload/v1773501466/Turn5_Song_weof9a.mp4";

video.src = TURN5_VIDEO_URL;

// 念のため
video.play().catch(e => {
  console.log("play blocked:", e);
});
</script>

</body>
</html>
