<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Visual Screen</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, sans-serif;
    }

    .wrap {
      position: relative;
      width: 100%;
      height: 100%;
      background: #111;
      display: flex;
      flex-direction: row;
    }

    #img {
      width: 45%;
      height: 100%;
      object-fit: cover;
      background: #000;
      display: block;
    }

    .right {
      flex: 1;
      height: 100%;
      box-sizing: border-box;
      padding: 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: linear-gradient(135deg, #111, #1a1a1a);
      color: #fff;
    }

    #caption {
      font-size: 56px;
      line-height: 1.15;
      margin: 0 0 28px 0;
      font-weight: 700;
    }

    .barOuter {
      width: 100%;
      height: 22px;
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    #bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00f2ff, #00ff9d);
      transition: width .5s ease;
    }

    #percent {
      margin-top: 18px;
      font-size: 34px;
      opacity: .92;
    }

    #hint {
      margin-top: auto;
      font-size: 16px;
      opacity: .65;
    }

    #fsBtn {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 20;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.45);
      color: #fff;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
      cursor: pointer;
      backdrop-filter: blur(6px);
    }

    #fsBtn:hover {
      background: rgba(255,255,255,0.14);
    }
    
    
  </style>
</head>
<body>

  <div class="wrap" id="app">
    <button id="fsBtn">全画面</button>

    <img id="img" src="" alt="visual">

    <div class="right">
      <h1 id="caption">演出待機中...</h1>

      <div class="barOuter">
        <div id="bar"></div>
      </div>

      <div id="percent">0%</div>
      <div id="hint">presentation screen</div>
    </div>
  </div>

  <script>
    const img = document.getElementById('img');
    const caption = document.getElementById('caption');
    const bar = document.getElementById('bar');
    const percent = document.getElementById('percent');
    const fsBtn = document.getElementById('fsBtn');

  
    function updateView(data){
      if (!data) return;

      if (typeof data.img === 'string' && data.img) {
        img.src = data.img;
      }
      if (typeof data.caption === 'string') {
        caption.textContent = data.caption;
      }
      if (typeof data.progress === 'number') {
        const p = Math.max(0, Math.min(100, data.progress));
        bar.style.width = p + '%';
        percent.textContent = p + '%';
      }
    }

  window.addEventListener('message', (e) => {
  const data = e.data || {};
  updateView(data);
});


    async function enterFullscreen_(){
      const el = document.documentElement;
      try {
        if (el.requestFullscreen) {
          await el.requestFullscreen();
        } else if (el.webkitRequestFullscreen) {
          el.webkitRequestFullscreen();
        } else if (el.msRequestFullscreen) {
          el.msRequestFullscreen();
        }
      } catch (e) {
        console.log('fullscreen blocked:', e);
      }
    }

    fsBtn.addEventListener('click', enterFullscreen_);

    window.addEventListener('load', () => {
      // 開いた直後に1回だけ試す
      setTimeout(() => {
        enterFullscreen_();
      }, 300);
    });
  </script>
</body>
</html>
