<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Visual Screen</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, sans-serif;
    }

    .wrap {
      position: relative;
      width: 100%;
      height: 100%;
      background: #111;
      display: flex;
      flex-direction: row;
    }

    #img {
      width: 45%;
      height: 100%;
      object-fit: cover;
      background: #000;
      display: block;
    }

    .right {
      flex: 1;
      height: 100%;
      box-sizing: border-box;
      padding: 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: linear-gradient(135deg, #111, #1a1a1a);
      color: #fff;
    }

    #caption {
      font-size: 56px;
      line-height: 1.15;
      margin: 0 0 28px 0;
      font-weight: 700;
    }

    .barOuter {
      width: 100%;
      height: 22px;
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    #bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00f2ff, #00ff9d);
      transition: width .5s ease;
    }

    #percent {
      margin-top: 18px;
      font-size: 34px;
      opacity: .92;
    }

    #hint {
      margin-top: auto;
      font-size: 16px;
      opacity: .65;
    }

    #fsBtn {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 20;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.45);
      color: #fff;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
      cursor: pointer;
      backdrop-filter: blur(6px);
    }

    #fsBtn:hover {
      background: rgba(255,255,255,0.14);
    }
#worldImage {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  object-fit: contain;
  background: #000;
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.8s ease;
}

#worldImage.show {
  opacity: 1;
}
    
  </style>
</head>
<body>
<audio id="resultBgm"></audio>
<img id="worldImage" alt="world result">
  
  <div class="wrap" id="app">
    <button id="fsBtn">全画面</button>

    <img id="img" src="" alt="visual">

    <div class="right">
      <h1 id="caption">演出待機中...</h1>

      <div class="barOuter">
        <div id="bar"></div>
      </div>

      <div id="percent">0%</div>
      <div id="hint">presentation screen</div>
    </div>
  </div>

  <script>
    const img = document.getElementById('img');
    const caption = document.getElementById('caption');
    const bar = document.getElementById('bar');
    const percent = document.getElementById('percent');
    const fsBtn = document.getElementById('fsBtn');

    const resultBgm = document.getElementById('resultBgm');
const worldImage = document.getElementById('worldImage');

const BGM_URL = 'https://raw.githubusercontent.com/KponzY/audio-assets/2a8fc24c8f74aa9973c6f8470ffab08f7b58b76c/showing_result.mp3';

const RESULT_MAP = {
  W111: 'https://raw.githubusercontent.com/KponzY/audio-assets/4b2774a6dcb8cfaeb434c751f65b62d071f6742e/W111_ideal_society.png',
  W110: 'https://raw.githubusercontent.com/KponzY/audio-assets/4b2774a6dcb8cfaeb434c751f65b62d071f6742e/W110_inequality_society.png',
  W101: 'https://raw.githubusercontent.com/KponzY/audio-assets/4b2774a6dcb8cfaeb434c751f65b62d071f6742e/W101_sustainable_slow_growth.png',
  W100: 'https://raw.githubusercontent.com/KponzY/audio-assets/4b2774a6dcb8cfaeb434c751f65b62d071f6742e/W100_environment_overregulated.png',
  W011: 'https://raw.githubusercontent.com/KponzY/audio-assets/4b2774a6dcb8cfaeb434c751f65b62d071f6742e/W011_growth_with_pollution.png',
  W010: 'https://raw.githubusercontent.com/KponzY/audio-assets/4b2774a6dcb8cfaeb434c751f65b62d071f6742e/W010_runaway_capitalism.png',
  W001: 'https://raw.githubusercontent.com/KponzY/audio-assets/4b2774a6dcb8cfaeb434c751f65b62d071f6742e/W001_welfare_low_growth.png',
  W000: 'https://raw.githubusercontent.com/KponzY/audio-assets/4b2774a6dcb8cfaeb434c751f65b62d071f6742e/W000_collapsed_world.png'
};

function showResultScreen(type){
  const src = RESULT_MAP[type];
  if (!src) return;

  const app = document.getElementById('app');

  // まず既存レイアウトを即消す
  app.style.display = 'none';

  // 背景を真っ黒に固定
  document.body.style.background = '#000';

  worldImage.src = src;
  worldImage.style.display = 'block';

  // 1フレーム待ってからフェード表示
  requestAnimationFrame(() => {
    worldImage.classList.add('show');
  });

  setTimeout(() => {
    hideResultScreen();
  }, 22000);
}

function hideResultScreen(){
  const app = document.getElementById('app');

  worldImage.classList.remove('show');
  worldImage.style.display = 'none';

  app.style.display = 'flex';
}

    function updateView(data){
      if (!data) return;

      if (typeof data.img === 'string' && data.img) {
        img.src = data.img;
      }
      if (typeof data.caption === 'string') {
        caption.textContent = data.caption;
      }
      if (typeof data.progress === 'number') {
        const p = Math.max(0, Math.min(100, data.progress));
        bar.style.width = p + '%';
        percent.textContent = p + '%';
      }
    }

  window.addEventListener('message', (e) => {
  const data = e.data || {};

  // ★結果表示（追加）
  if (data.type === 'SHOW_RESULT') {
    console.log('SHOW_RESULT受信', data);
    showResultScreen(data.resultType);
    return;
  }

  if (data.type === 'HIDE_RESULT') {
    hideResultScreen();
    return;
  }

  // ★既存処理は絶対残す
  updateView(data);
});

    async function enterFullscreen_(){
      const el = document.documentElement;
      try {
        if (el.requestFullscreen) {
          await el.requestFullscreen();
        } else if (el.webkitRequestFullscreen) {
          el.webkitRequestFullscreen();
        } else if (el.msRequestFullscreen) {
          el.msRequestFullscreen();
        }
      } catch (e) {
        console.log('fullscreen blocked:', e);
      }
    }

    fsBtn.addEventListener('click', enterFullscreen_);

    window.addEventListener('load', () => {
      // 開いた直後に1回だけ試す
      setTimeout(() => {
        enterFullscreen_();
      }, 300);
    });
  </script>
</body>
</html>
