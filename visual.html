<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>集計演出画面</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .wrap {
      display: flex;
      width: 100%;
      height: 100%;
      background: #111;
    }

    #img {
      width: 45%;
      height: 100%;
      object-fit: cover;
      background: #000;
      display: block;
    }

    .right {
      flex: 1;
      padding: 48px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      color: #fff;
      box-sizing: border-box;
    }

    #caption {
      font-size: 56px;
      line-height: 1.15;
      margin: 0;
    }

    .barOuter {
      height: 18px;
      background: #444;
      border-radius: 10px;
      overflow: hidden;
    }

    #bar {
      height: 100%;
      width: 0%;
      background: #4caf50;
      transition: width .6s ease;
    }

    #percent {
      font-size: 36px;
      opacity: .9;
    }

    #hint {
      font-size: 16px;
      opacity: .65;
      margin-top: auto;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img id="img" src="ai.png" alt="worker">
    <div class="right">
      <h1 id="caption">集計準備中…</h1>
      <div class="barOuter"><div id="bar"></div></div>
      <div id="percent">0%</div>
      <div id="hint">※この画面は投影用です（サイドバー操作で更新）</div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const BASE = 'https://kponzy.github.io/audio-assets/';

    function resolveImgSrc_(src){
      if (!src) return src;
      if (/^(https?:|data:)/i.test(src)) return src;
      if (src.startsWith('/')) return BASE + src.replace(/^\/+/, '');
      return BASE + src;
    }

    function applyState(s){
      if (!s) return;

      if (typeof s.img === 'string') {
        $('img').src = resolveImgSrc_(s.img);
      }
      if (typeof s.caption === 'string') {
        $('caption').textContent = s.caption;
      }
      if (typeof s.progress === 'number') {
        const p = Math.max(0, Math.min(100, s.progress));
        $('bar').style.width = p + '%';
        $('percent').textContent = p + '%';
      }
    }

    window.addEventListener('message', (ev) => {
      if (!ev || !ev.data) return;
      const d = ev.data;

      if (typeof d === 'object' && ('img' in d || 'caption' in d || 'progress' in d)) {
        applyState(d);
        return;
      }

      if (d && d.type === 'VIS_STATE') {
        applyState(d.payload);
      }
    });
  </script>
</body>
</html>
