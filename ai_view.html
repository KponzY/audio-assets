<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>AI COMMENT VIEW</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0b0d12;
      color: #eaf2ff;
      font-family: "Noto Sans JP", system-ui, sans-serif;
    }

    .wrap {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      color: #00ff9d;
      letter-spacing: .08em;
      border-bottom: 1px solid rgba(255,255,255,.12);
      padding-bottom: 12px;
    }

    #bodyText {
      flex: 1;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 28px;
      line-height: 1.8;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 22px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">AI COMMENT VIEW</div>
    <div id="bodyText">待機中...</div>
  </div>

  <script>
    const bodyText = document.getElementById('bodyText');

    window.addEventListener('message', function(e){
      if (!e || !e.data) return;
      if (e.data.type === 'AI_VIEW_UPDATE') {
        bodyText.textContent = e.data.text || '';
      }
    });
  </script>
</body>
</html>
